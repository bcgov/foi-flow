# GitHub Actions workflow for building and tagging the API image on PR
name: Publication Service - Continuous Integration

on:
  #workflow_dispatch: 
  #  inputs:
  #    image_tag:
  #      description: 'Image Tag to Deploy'
  #      required: true
  pull_request:
    types: [opened, synchronize, ready_for_review] # Triggered by opened or changed pull requests.
    branches: [dev]
    paths:
      - 'publication-service/**' # Triggers on changes to files in the express-api/ directory.
#env:
#  IMAGE_TAG: ${{ github.event.inputs.image_tag }}

jobs:
# Job for automated unit tests goes HERE

# Build the docker image, tag with pull request
  PUBLICATION-SERVICE-IMAGE-BUILD:
    runs-on: ubuntu-latest
    steps:
  # Checkout repo
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

  # Login to BC Gov Openshift Image Repository via docker

      - name: Login to Openshift Docker
        run: |
          echo "${{ secrets.OPENSHIFT_SA_TOOLS_TOKEN }}" | docker login ${{ secrets.PUBLIC_IMAGE_REPOSITORY }}  -u ${{ secrets.OPENSHIFT_SA_NAME }} --password-stdin 

  # Build the Publication Service Image, Tag with Pull Request number
      - name: Build Publication Service Image
        working-directory: ./publication-service
        run: |
          docker build -t ${{ secrets.PUBLIC_IMAGE_REPOSITORY }}/${{ secrets.OPENSHIFT_TOOLS_NAMESPACE }}/publication-service:${{ github.event.pull_request.number }} -f Dockerfile .

  # Push Built Image to BC Gov Openshift Image Repository
      - name: Push Publication Service Image
        run: |
          docker push ${{ secrets.PUBLIC_IMAGE_REPOSITORY }}/${{ secrets.OPENSHIFT_TOOLS_NAMESPACE }}/publication-service:${{ github.event.pull_request.number }}

  PUBLICATION-SERVICE-PR-COMMENT:
    needs: PUBLICATION-SERVICE-IMAGE-BUILD
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            **Tag:** `${{ github.event.pull_request.number }}`  
            **Image:** `${{ secrets.PUBLIC_IMAGE_REPOSITORY }}/${{ secrets.OPENSHIFT_TOOLS_NAMESPACE }}/publication-service:${{ github.event.pull_request.number }}`
